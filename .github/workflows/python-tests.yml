name: Run Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Challenge 06 Unit Tests
        working-directory: challenge_06_benefits_calculator
        run: |
          python -m unittest test_calculator.py

      - name: Run Challenge 10 Unit Tests
        working-directory: challenge_10_fraud_detection
        run: |
          python -m unittest test_detector.py
